<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASDF 피아노 리듬게임</title>
  <link rel="icon" type="image/svg+xml" href="rhythm-badge.svg">
  <link rel="stylesheet" href="sytle.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="게임 상태">
      <div>
        <span class="label">점수</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span class="label">콤보</span>
        <strong id="combo">0</strong>
      </div>
      <div>
        <span class="label">판정</span>
        <strong id="judgement">준비</strong>
      </div>
    </section>

    <section class="difficulty" aria-label="난이도 선택">
      <label>
        <input type="radio" name="difficulty" value="easy">
        <span>쉬움</span>
      </label>
      <label>
        <input type="radio" name="difficulty" value="normal" checked>
        <span>보통</span>
      </label>
      <label>
        <input type="radio" name="difficulty" value="hard">
        <span>어려움</span>
      </label>
    </section>

    <section class="mode-select" aria-label="게임 모드 선택">
      <label>
        <input type="radio" name="gameMode" value="classic" checked>
        <span>ASDF 모드</span>
      </label>
      <label>
        <input type="radio" name="gameMode" value="piano">
        <span>피아노 모드</span>
      </label>
    </section>

    <section class="song-import" aria-label="피아노 모드 음원 업로드">
      <label for="songUpload">피아노 모드 음원</label>
      <input id="songUpload" type="file" accept="audio/*">
      <span id="analysisStatus">업로드하면 자동으로 피아노 노트를 만듭니다</span>
    </section>

    <section class="stage" aria-label="피아노 리듬 레인">
      <div class="hit-line"></div>
    </section>

    <section class="controls">
      <button id="startButton" type="button">시작</button>
      <button id="restartButton" type="button">다시 시작</button>
    </section>
  </main>

  <audio
    id="song"
    src="a_minecraft_movie_07. Steves Lava Chicken.mp3"
    preload="auto"
  ></audio>

  <script src="main.js"></script>
</body>
</html>
